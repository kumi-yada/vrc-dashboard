    children:
      - url: "{{ _.base_url }}/auth/exists"
        name: Check User Exists
        meta:
          id: req_aac513b35b534738bc8ee48db7ee0ada
          created: 1742488671503
          modified: 1742488671503
          isPrivate: false
          description: >-
            Checks if a user by a given `username`, `displayName` or `email`
            exist. This is used during registration to check if a username has
            already been taken, during change of displayName to check if a
            displayName is available, and during change of email to check if the
            email is already used. In the later two cases the `excludeUserId` is
            used to exclude oneself, otherwise the result would always be true.


            It is **REQUIRED** to include **AT LEAST** `username`, `displayName`
            **or** `email` query parameter. Although they can be combined - in
            addition with `excludeUserId` (generally to exclude yourself) - to
            further fine-tune the search.
          sortKey: -1742488671503
        method: GET
        parameters:
          - name: email
            value: string
            disabled: true
          - name: displayName
            value: string
            disabled: true
          - name: username
            value: string
            disabled: true
          - name: excludeUserId
            value: string
            disabled: true
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.base_url }}/auth/user"
        name: Login and/or Get Current User Info
        meta:
          id: req_aac881f242644b28b98de86d50aff5bb
          created: 1742488671505
          modified: 1761115823895
          isPrivate: false
          description: >-
            This endpoint does the following two operations:
              1) Checks if you are already logged in by looking for a valid `auth` cookie. If you are have a valid auth cookie then no additional auth-related actions are taken. If you are **not** logged in then it will log you in with the `Authorization` header and set the `auth` cookie. The `auth` cookie will only be sent once.
              2) If logged in, this function will also return the CurrentUser object containing detailed information about the currently logged in user.

            The auth string after `Authorization: Basic {string}` is a
            base64-encoded string of the username and password, both
            individually url-encoded, and then joined with a colon.
              
            > base64(urlencode(username):urlencode(password))


            **WARNING: Session Limit:** Each authentication with login
            credentials counts as a separate session, out of which you have a
            limited amount. Make sure to save and reuse the `auth` cookie if you
            are often restarting the program. The provided API libraries
            automatically save cookies during runtime, but does not persist
            during restart. While it can be fine to use username/password during
            development, expect in production to very fast run into the
            rate-limit and be temporarily blocked from making new sessions until
            older ones expire. The exact number of simultaneous sessions is
            unknown/undisclosed.
          sortKey: -1742488671505
        method: GET
        headers:
          - name: User-Agent
            value: Mozilla/5.0 (X11; Linux x86_64; rv:136.0) Gecko/20100101 Firefox/136.0
            description: ""
            disabled: false
        authentication:
          type: basic
          username: "{{ _.httpUsername }}"
          password: "{{ _.httpPassword }}"
          disabled: false
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
